<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Chat Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f59e0b;
    }
    .status-dot.green { background: #22c55e; }
    .status-dot.red { background: #ef4444; }

    /* ── Nickname overlay ── */
    .nickname-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
    }
    .nickname-overlay.hidden { display: none; }
    .nickname-overlay h2 { font-size: 20px; font-weight: 700; }
    .nickname-overlay input {
      width: min(280px, 80vw);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 16px;
      text-align: center;
      outline: none;
    }
    .nickname-overlay input:focus { border-color: #4361ee; }
    .nickname-overlay button {
      width: min(280px, 80vw);
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #4361ee;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .nickname-overlay button:active { background: #3451d1; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      animation: fadeIn 0.2s ease-out;
    }
    .msg.other {
      align-self: flex-start;
      background: #1e1e1e;
    }
    .msg.mine {
      align-self: flex-end;
      background: #4361ee;
    }
    .msg .name {
      display: block;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 2px;
      opacity: 0.7;
    }
    .msg.mine .name { display: none; }

    .msg.system {
      align-self: center;
      background: none;
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      padding: 4px 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-bar input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .input-bar input:focus { border-color: #4361ee; }
    .input-bar button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #4361ee;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .input-bar button:active { background: #3451d1; }
  </style>
</head>
<body>

  <!-- Nickname screen -->
  <div class="nickname-overlay" id="nicknameScreen">
    <h2>Join Chat</h2>
    <input type="text" id="nicknameInput" placeholder="Your name" maxlength="20" autocomplete="off" />
    <button id="nicknameBtn">Enter</button>
  </div>

  <!-- Chat UI -->
  <div class="header">
    <h1>Chat Room</h1>
    <div class="status">
      <div class="status-dot" id="dot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" />
    <button id="sendBtn">Send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    let nickname = '';
    const socket = io({ transports: ['websocket'] });

    // ── Nickname ──
    function enterChat() {
      const val = $('nicknameInput').value.trim();
      nickname = val || 'Anonymous';
      $('nicknameScreen').classList.add('hidden');
      $('msgInput').focus();
    }
    $('nicknameBtn').addEventListener('click', enterChat);
    $('nicknameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') enterChat();
    });

    // ── Connection status ──
    function setStatus(color, text) {
      $('dot').className = 'status-dot ' + color;
      $('statusText').textContent = text;
    }
    socket.on('connect', () => setStatus('green', 'Connected'));
    socket.on('disconnect', () => setStatus('red', 'Disconnected'));
    socket.on('connect_error', () => setStatus('red', 'Connection error'));

    // ── Messages ──
    function addMsg(user, text, isSystem) {
      const div = document.createElement('div');
      if (isSystem) {
        div.className = 'msg system';
        div.textContent = text;
      } else {
        const isMine = user === nickname;
        div.className = 'msg ' + (isMine ? 'mine' : 'other');
        div.innerHTML = '<span class="name">' + escHtml(user) + '</span>' + escHtml(text);
      }
      $('messages').appendChild(div);
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    socket.on('chat message', (data) => {
      addMsg(data.user, data.text, false);
    });

    // ── Send ──
    function send() {
      const text = $('msgInput').value.trim();
      if (!text || !nickname) return;
      socket.emit('chat message', { user: nickname, text });
      $('msgInput').value = '';
    }
    $('sendBtn').addEventListener('click', send);
    $('msgInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
